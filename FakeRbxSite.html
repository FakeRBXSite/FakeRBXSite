<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Robux</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Montserrat:wght@600;700&family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           BASE SETUP & STYLES
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        html, body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-image: url('background.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35); 
            z-index: 0;
            transition: opacity 0.2s ease;
        }

        body.gui-closed::before {
            opacity: 0;
            pointer-events: none;
        }

        /* ==========================================================================
           UTILITY & WIDGET ELEMENTS
           ========================================================================== */
        .secret-open-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            width: 32px;
            height: 32px;
            background: rgba(25, 27, 29, 0.15);
            border: 1px solid rgba(25, 27, 29, 0.1);
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #78848c;
            font-size: 18px;
            cursor: pointer;
            z-index: 999;
            transition: all 0.15s ease;
        }
        
        .secret-open-btn:hover {
            background: rgba(25, 27, 29, 0.4);
            color: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        /* ==========================================================================
           NOTIFICATIONS (SUCCESS & ERROR)
           ========================================================================== */
        .top-notification {
            position: absolute;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #191b1d;
            padding: 12px 28px;
            border-radius: 50px; 
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            font-weight: 800;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 9999;
            transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(222, 225, 227, 0.7);
            white-space: nowrap;
        }

        .top-notification.show { top: 20px; }

        .top-error-notification {
            position: absolute;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(246, 59, 47, 0.08); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #f63b2f; 
            padding: 12px 28px;
            border-radius: 50px; 
            box-shadow: 0 8px 30px rgba(246, 59, 47, 0.15);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            font-weight: 800;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 9999;
            transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(246, 59, 47, 0.25);
            white-space: nowrap;
        }

        .top-error-notification.show { top: 20px; }
        .top-notif-icon { width: 18px; height: 18px; object-fit: contain; }
        .top-error-icon { width: 20px; height: 20px; object-fit: contain; }

        /* ==========================================================================
           MAIN CARD CONTAINER
           ========================================================================== */
        .main-card {
            width: 465px; 
            height: 445px; 
            background: #ffffff !important; 
            border: 1px solid #dee1e3;
            border-radius: 16px; 
            padding: 30px 45px; 
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1; 
            display: flex;
            flex-direction: column;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .main-card.hidden {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
        }

        .close-gui-btn {
            position: absolute;
            top: 12px;
            right: 18px;
            font-size: 22px;
            font-weight: 600;
            color: #78848c;
            cursor: pointer;
            transition: color 0.1s ease;
            line-height: 1;
            z-index: 10;
        }

        .close-gui-btn:hover { color: #191b1d; }

        /* ==========================================================================
           HEADER COMPONENT
           ========================================================================== */
        .header-container {
            display: flex;
            align-items: center;
            justify-content: space-between; 
            margin-bottom: 20px; 
            padding-bottom: 15px;
            border-bottom: 1px solid #dee1e3;
            margin-left: -25px;  
            margin-right: -25px; 
            margin-top: -10px; 
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 6px; 
        }

        .rplus-icon { width: 24px; height: 24px; object-fit: contain; }

        .header-container h1 {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            font-size: 19px; 
            font-weight: 700;
            color: #191b1d;
            letter-spacing: -0.4px;
        }

        .header-balance-widget {
            display: flex;
            align-items: center;
            gap: 5px;
            background: #f2f4f5;
            padding: 5px 12px;
            border-radius: 50px;
            border: 1px solid #dee1e3;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 14px;
            color: #191b1d;
            margin-right: 15px; 
        }

        .balance-icon { width: 16px; height: 16px; object-fit: contain; }

        /* ==========================================================================
           PANELS & WIDGETS SYSTEM
           ========================================================================== */
        .step-panel {
            display: none;
            flex-grow: 1;
        }

        .step-panel.active {
            display: flex;
            flex-direction: column;
        }

        .form-group {
            margin-bottom: 10px;
            width: 100%;
            margin-top: -5px; 
        }

        .input-control {
            width: calc(100% + 50px); 
            margin-left: -25px; 
            padding: 10px 16px; 
            background: #ffffff;
            border: 3px solid #78848c; 
            border-radius: 6px;       
            color: #191b1d;
            font-size: 17px; 
            font-weight: 500;
            outline: none;
            transition: border-color 0.15s ease;
        }

        .input-control::placeholder {
            font-family: sans-serif !important;
            color: #78848c;
            font-size: 17px; 
        }

        .input-control:focus { border-color: #2657ff; }

        .friends-counter-label {
            font-size: 17px; 
            font-weight: 700; 
            color: #656d73;
            margin-top: 12px;
            margin-left: -25px;
        }

        /* ==========================================================================
           RESULTS LAYOUT
           ========================================================================== */
        .results-container {
            margin-top: 15px;
            border-top: 1px solid #dee1e3;
            padding-top: 15px;
            width: 100%;
            display: none;
        }

        .results-title {
            font-size: 12px;
            font-weight: 700;
            color: #656d73;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            margin-left: -25px;
        }

        .search-loader-box {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #f8fafc;
            padding: 20px;
            border-radius: 6px;
            border: 1px solid #dee1e3;
            width: calc(100% + 50px);
            margin-left: -25px;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid #e2e8f0;
            border-top: 3px solid #2657ff; 
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loader-text { font-size: 15px; font-weight: 600; color: #656d73; }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .player-row {
            display: none; 
            align-items: center;
            background: #f2f4f5;
            padding: 12px 20px;
            border-radius: 6px;
            border: 1px solid #dee1e3;
            width: calc(100% + 50px);
            margin-left: -25px;
            cursor: pointer; 
            transition: all 0.1s ease;
        }

        .player-row:hover {
            background: #e8ecef;
            transform: translateY(-1px);
        }

        .player-row:active { background: #dee1e3; }

        .player-row-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar-wrapper-relative {
            width: 44px;
            height: 44px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .custom-avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #bdc4c7;
            background: #e8ecef; 
        }

        .text-banned-badge-small {
            width: 100%;
            height: 24px;
            background: #f63b2f;
            color: #ffffff;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            border: 1px solid #d32f2f;
            letter-spacing: 0.3px;
        }

        .result-username { font-size: 16px; font-weight: 600; color: #191b1d; }

        /* ==========================================================================
           AMOUNT WRAPPERS & FIELDS
           ========================================================================== */
        .custom-amount-wrapper {
            display: flex;
            align-items: center;
            justify-content: center; 
            background: #f2f4f5;
            border-radius: 6px;
            padding: 10px 20px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 280px;
            margin-left: auto;
            margin-right: auto;
        }

        .amount-flow-container { display: flex; align-items: center; gap: 8px; }
        .robux-field-icon { width: 28px; height: 28px; object-fit: contain; }

        .builder-sans-input {
            background: transparent !important;
            border: none !important;
            outline: none !important;
            font-family: 'Inter', sans-serif;
            font-weight: 900; 
            font-size: 32px; 
            color: #191b1d;
            width: 32px; 
            text-align: left;
        }

        /* Кнопка Next на всю ширину для другого етапу */
        .btn-roblox {
            width: 100%;
            padding: 11px 14px; 
            background-color: #2657ff; 
            border: none;
            border-radius: 6px;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s ease;
            margin-top: auto; 
        }

        .btn-roblox.disabled {
            opacity: 0.4 !important; 
            cursor: not-allowed !important;
            pointer-events: none !important;
        }

        /* ==========================================================================
           PROFILE CARD VIEWS
           ========================================================================== */
        .profile-top-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            text-align: center;
        }

        .big-avatar-wrapper {
            width: 90px;
            height: 90px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar-container-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #dee1e3;
            background: #e8ecef;
        }

        .username-text-small {
            font-size: 14px;
            font-weight: 600;
            color: #545b61;
            background: #f2f4f5;
            padding: 4px 16px;
            border-radius: 12px;
            border: 1px solid #dee1e3;
            margin-bottom: 8px;
        }

        .player-meta-info-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 220px; 
            font-size: 12px;
            font-weight: 600;
            color: #78848c; 
        }

        /* Швидкий вибір сум */
        .fast-amounts-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 320px;
            margin-left: auto;
            margin-right: auto;
        }

        .fast-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-family: 'Montserrat', sans-serif;
            background: #dcdfe1; 
            border: none;        
            border-radius: 8px;                    
            padding: 8px 2px;                      
            color: #191b1d;      
            font-size: 13px;                       
            font-weight: 700;
            cursor: pointer;
        }

        .fast-btn img { width: 13px; height: 13px; object-fit: contain; }
        .fast-btn:hover { background: #ced2d5; } 
        .fast-btn.active { background: rgba(38, 87, 255, 0.15); color: #2657ff; } 

        /* Крок 3: Фінальні дисплеї */
        .final-amount-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
            background: #f8fafc;
            border: 1px solid #dee1e3;
            padding: 12px 25px;
            border-radius: 8px;
            max-width: 260px;
            margin-left: auto;
            margin-right: auto;
        }

        .final-amount-text {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: 34px;
            color: #191b1d;
        }

        .step3-btn-row { display: flex; gap: 12px; width: 100%; margin-top: auto; }

        .btn-step3 {
            flex: 1;
            padding: 11px 14px; 
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        .btn-send-final { background-color: #2657ff; color: #ffffff; border: none; }
        .btn-edit-back { background-color: #ffffff; color: #545b61; border: 1px solid #bdc4c7; }
        .btn-edit-back:hover { background-color: #f2f4f5; color: #191b1d; }

        /* Адмін-панель модального типу */
        .secret-admin-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 10000;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .secret-admin-modal.open { opacity: 1; pointer-events: auto; }
        .admin-card { width: 340px; background: #191b1d; border: 2px solid #2657ff; border-radius: 12px; padding: 25px; box-shadow: 0 15px 50px rgba(0, 0, 0, 0.7); color: #ffffff; text-align: center; }
        
        .admin-card h2 { font-size: 18px; font-weight: 700; margin-bottom: 8px; color: #2657ff; text-transform: uppercase; }
        .admin-card p { font-size: 13px; color: #98a1a8; margin-bottom: 20px; }
        .admin-input-group { display: flex; align-items: center; background: #282b30; border: 1px solid #40464d; border-radius: 6px; padding: 8px 14px; margin-bottom: 20px; }
        .admin-input-icon { width: 20px; height: 20px; margin-right: 10px; }
        .admin-field { background: transparent; border: none; outline: none; color: #ffffff; font-size: 18px; font-weight: 700; width: 100%; }

        .admin-btn-row { display: flex; gap: 10px; }
        .admin-btn { flex: 1; padding: 11px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; }
        .admin-btn-apply { background: #2657ff; color: #ffffff; }
        .admin-btn-close { background: #40464d; color: #dee1e3; }
    </style>
</head>
<body>

    <div class="secret-open-btn" onclick="openGui()">⚙️</div>

    <div class="main-card" id="mainGuiCard">
        <div class="close-gui-btn" onclick="closeGui()">&times;</div>
        
        <div class="header-container">
            <div class="header-left">
                <img src="https://static.wikia.nocookie.net/logopedia/images/f/f9/RblxPlusLogo.svg/revision/latest/scale-to-width-down/200?cb=20260501155012" alt="R+" class="rplus-icon">
                <h1>Send Robux</h1>
            </div>
            <div class="header-balance-widget">
                <img src="https://devforum-uploads.s3.dualstack.us-east-2.amazonaws.com/uploads/original/4X/c/2/f/c2fc0404eeb8d393407bdaebe2cc9994a8953550.png" alt="Robux" class="balance-icon">
                <span id="balanceAmountText">5,000</span>
            </div>
        </div>

        <div class="step-panel active" id="step1">
            <div class="form-group">
                <input type="text" id="usernameInput" class="input-control" placeholder="Search by username or ID" autocomplete="off">
                <div class="friends-counter-label">My friends (0)</div>
            </div>

            <div class="results-container" id="resultsBox">
                <div class="results-title" id="resultsCountText">Results (0)</div>
                
                <div class="search-loader-box" id="searchLoader">
                    <div class="spinner"></div>
                    <div class="loader-text">Searching player...</div>
                </div>

                <div class="player-row" id="playerRowResult" onclick="goToStep2()">
                    <div class="player-row-left">
                        <div class="avatar-wrapper-relative" id="rowAvatarWrapper"></div>
                        <div class="result-username" id="resultUsernameText">Username</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="step-panel" id="step2">
            <div class="profile-top-center">
                <div class="big-avatar-wrapper" id="bigAvatarWrapper"></div>
                <div class="username-text-small" id="displayUsername">PlayerName</div>
                <div class="player-meta-info-row">
                    <span id="metaJoinDateText">Reg: --.--.----</span>
                    <span id="metaBannedText">Banned: No</span>
                </div>
            </div>

            <div class="form-group">
                <div class="custom-amount-wrapper">
                    <div class="amount-flow-container">
                        <img src="https://devforum-uploads.s3.dualstack.us-east-2.amazonaws.com/uploads/original/4X/c/2/f/c2fc0404eeb8d393407bdaebe2cc9994a8953550.png" alt="Robux" class="robux-field-icon">
                        <input type="text" id="customAmountInput" class="builder-sans-input" placeholder="0" autocomplete="off" oninput="formatAndValidateInput(this)">
                    </div>
                </div>
                
                <div class="fast-amounts-container">
                    <div class="fast-btn" onclick="setFastAmount(this, 25)"><img src="https://devforum-uploads.s3.dualstack.us-east-2.amazonaws.com/uploads/original/4X/c/2/f/c2fc0404eeb8d393407bdaebe2cc9994a8953550.png" alt="R">25</div>
                    <div class="fast-btn" onclick="setFastAmount(this, 50)"><img src="https://devforum-uploads.s3.dualstack.us-east-2.amazonaws.com/uploads/original/4X/c/2/f/c2fc0404eeb8d393407bdaebe2cc9994a8953550.png" alt="R">50</div>
                    <div class="fast-btn" onclick="setFastAmount(this, 100)"><img src="https://devforum-uploads.s3.dualstack.us-east-2.amazonaws.com/uploads/original/4X/c/2/f/c2fc0404eeb8d393407bdaebe2cc9994a8953550.png" alt="R">100</div>
                    <div class="fast-btn" onclick="setFastAmount(this, 200)"><img src="https://devforum-uploads.s3.dualstack.us-east-2.amazonaws.com/uploads/original/4X/c/2/f/c2fc0404eeb8d393407bdaebe2cc9994a8953550.png" alt="R">200</div>
                </div>
            </div>

            <button class="btn-roblox disabled" id="nextStepBtn" onclick="goToStep3()">Next</button>
        </div>

        <div class="step-panel" id="step3">
            <div class="profile-top-center">
                <div class="big-avatar-wrapper" id="bigAvatarWrapperStep3"></div>
                <div class="username-text-small" id="displayUsernameStep3">PlayerName</div>
            </div>

            <div class="final-amount-display">
                <img src="https://devforum-uploads.s3.dualstack.us-east-2.amazonaws.com/uploads/original/4X/c/2/f/c2fc0404eeb8d393407bdaebe2cc9994a8953550.png" alt="Robux" style="width: 30px; height: 30px; object-fit: contain;">
                <span class="final-amount-text" id="finalAmountText">0</span>
            </div>

            <div class="step3-btn-row">
                <button class="btn-step3 btn-send-final" onclick="confirmAndSend()">Send</button>
                <button class="btn-step3 btn-edit-back" onclick="backToStep2()">Edit</button>
            </div>
        </div>
    </div>

    <div class="top-notification" id="topCapsihleNotif">Transaction Processed Successfully!</div>
    <div class="top-error-notification" id="topErrorNotif">
        <img src="https://img.icons8.com/ios11/512/FFFFFF/appointment-reminders.png" alt="Notification" class="top-error-icon">
        <span id="errorNotifText">User not found. Please try again.</span>
    </div>

    <div class="secret-admin-modal" id="adminModal">
        <div class="admin-card">
            <h2>Admin Panel</h2>
            <p>Enter the new Robux balance amount</p>
            <div class="admin-input-group">
                <img src="https://devforum-uploads.s3.dualstack.us-east-2.amazonaws.com/uploads/original/4X/c/2/f/c2fc0404eeb8d393407bdaebe2cc9994a8953550.png" alt="R" class="admin-input-icon">
                <input type="number" id="adminBalanceInput" class="admin-field" placeholder="Example: 50000" min="0">
            </div>
            <div class="admin-btn-row">
                <button class="admin-btn admin-btn-close" onclick="closeAdminMenu()">Cancel</button>
                <button class="admin-btn admin-btn-apply" onclick="applyNewBalance()">Apply</button>
            </div>
        </div>
    </div>

    <script>
        let targetUser = "";
        let myRobuxBalance = 5000; 
        let currentEnteredAmount = 0; 
        
        let currentAvatarUrl = "";
        let currentUserJoinDate = "--.--.----";
        let currentUserIsBanned = false;

        updateBalanceDisplay();

        function updateBalanceDisplay() {
            document.getElementById("balanceAmountText").innerText = myRobuxBalance.toLocaleString('en-US');
        }

        window.addEventListener("keydown", function(event) {
            if (event.ctrlKey && event.shiftKey && event.key.toLowerCase() === 'a') {
                event.preventDefault(); 
                openAdminMenu();
            }
        });

        function closeGui() {
            document.getElementById("mainGuiCard").classList.add("hidden");
            document.body.classList.add("gui-closed"); 
        }

        function openGui() {
            document.getElementById("mainGuiCard").classList.remove("hidden");
            document.body.classList.remove("gui-closed"); 
        }

        function openAdminMenu() {
            const modal = document.getElementById("adminModal");
            const input = document.getElementById("adminBalanceInput");
            input.value = myRobuxBalance; 
            modal.classList.add("open");
            input.focus();
        }

        function closeAdminMenu() { document.getElementById("adminModal").classList.remove("open"); }

        function applyNewBalance() {
            const inputVal = document.getElementById("adminBalanceInput").value;
            if (inputVal === "" || parseInt(inputVal) < 0) {
                alert("Please enter a valid amount!");
                return;
            }
            myRobuxBalance = parseInt(inputVal);
            updateBalanceDisplay(); 
            closeAdminMenu();       
        }

        document.getElementById("usernameInput").addEventListener("keyup", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                processStep1();
            }
        });

        function resizeAmountInput(input) {
            const length = input.value.length > 0 ? input.value.length : 1;
            input.style.width = (length * 20 + 8) + "px";
        }

        let errorTimeout;
        function showErrorNotification(message) {
            const errorNotif = document.getElementById("topErrorNotif");
            const errorText = document.getElementById("errorNotifText");
            
            if(message) {
                errorText.innerText = message;
            } else {
                errorText.innerText = "User not found. Please try again.";
            }

            errorNotif.classList.remove("show");
            clearTimeout(errorTimeout);
            setTimeout(() => { errorNotif.classList.add("show"); }, 50);
            errorTimeout = setTimeout(() => { errorNotif.classList.remove("show"); }, 4000);
        }

        async function fetchAvatarFromPython(username) {
            try {
                const response = await fetch(`http://127.0.0.1:5000/get_avatar?username=${encodeURIComponent(username)}`);
                return await response.json();
            } catch (error) {
                console.error("Python Server error:", error);
                return null;
            }
        }

        async function processStep1() {
            const inputVal = document.getElementById("usernameInput").value.trim();
            const grandfatherBox = document.getElementById("resultsBox");
            const loaderElement = document.getElementById("searchLoader");
            const playerRowResult = document.getElementById("playerRowResult");
            const rowAvatarWrapper = document.getElementById("rowAvatarWrapper");
            
            if (!inputVal) return;

            if (inputVal.length < 1 || inputVal.length > 20 || inputVal.toLowerCase() === "error") {
                hideResultsAndShowError("Invalid username format.");
                return;
            }

            playerRowResult.style.display = "none";
            document.getElementById("resultsCountText").innerText = "Results (0)";
            grandfatherBox.style.display = "block";
            loaderElement.style.display = "flex"; 

            const data = await fetchAvatarFromPython(inputVal);
            loaderElement.style.display = "none"; 

            if (!data || !data.success) {
                hideResultsAndShowError(data ? data.message : "Connection error with local backend.");
                return;
            }

            targetUser = data.username;
            currentAvatarUrl = data.avatarUrl;
            currentUserJoinDate = data.joinDate;
            currentUserIsBanned = data.isBanned;
            
            document.getElementById("resultsCountText").innerText = "Results (1)";
            document.getElementById("resultUsernameText").innerText = targetUser;

            if (currentUserIsBanned) {
                rowAvatarWrapper.innerHTML = `<div class="text-banned-badge-small">Banned</div>`;
            } else {
                rowAvatarWrapper.innerHTML = `<img src="${currentAvatarUrl}" alt="Avatar" class="custom-avatar-img">`;
            }

            playerRowResult.style.display = "flex";
        }

        function hideResultsAndShowError(message) {
            document.getElementById("resultsBox").style.display = "none";
            document.getElementById("playerRowResult").style.display = "none";
            document.getElementById("resultsCountText").innerText = "Results (0)";
            showErrorNotification(message);
        }

        function goToStep2() {
            const bigAvatarWrapper = document.getElementById("bigAvatarWrapper");
            document.getElementById("displayUsername").innerText = targetUser;
            document.getElementById("metaJoinDateText").innerText = `Reg: ${currentUserJoinDate}`;
            
            const bannedTextElement = document.getElementById("metaBannedText");
            bigAvatarWrapper.innerHTML = `<img src="${currentAvatarUrl}" alt="Avatar Large" class="avatar-container-img">`;
            
            if (currentUserIsBanned) {
                bannedTextElement.innerText = "Banned: Yes";
                bannedTextElement.style.color = "#f63b2f";
            } else {
                bannedTextElement.innerText = "Banned: No";
                bannedTextElement.style.color = "#78848c";
            }
            
            document.getElementById("step1").classList.remove("active");
            document.getElementById("step2").classList.add("active");
            
            const amountInput = document.getElementById("customAmountInput");
            amountInput.value = "";
            validateNextButton("");
            resizeAmountInput(amountInput);
        }

        function validateNextButton(rawStringValue) {
            const nextBtn = document.getElementById("nextStepBtn");
            const parsedVal = parseInt(rawStringValue.replace(/[^0-9]/g, ''));
            if (!rawStringValue || isNaN(parsedVal) || parsedVal <= 0) {
                nextBtn.classList.add("disabled");
            } else {
                nextBtn.classList.remove("disabled");
            }
        }

        function formatAndValidateInput(input) {
            let value = input.value.replace(/[^0-9]/g, '');
            input.value = value !== "" ? Number(value).toLocaleString('en-US') : "";
            document.querySelectorAll('.fast-btn').forEach(btn => btn.classList.remove('active'));
            validateNextButton(input.value);
            resizeAmountInput(input);
        }

        function setFastAmount(element, value) {
            document.querySelectorAll('.fast-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            const amountInput = document.getElementById("customAmountInput");
            amountInput.value = Number(value).toLocaleString('en-US');
            validateNextButton(amountInput.value);
            resizeAmountInput(amountInput);
        }

        function goToStep3() {
            const rawAmount = document.getElementById("customAmountInput").value.replace(/[^0-9]/g, '');
            currentEnteredAmount = parseInt(rawAmount);
            
            if (!rawAmount || isNaN(currentEnteredAmount) || currentEnteredAmount <= 0) return; 

            if (currentEnteredAmount > myRobuxBalance) {
                alert(`Insufficient funds! Your balance: ${myRobuxBalance.toLocaleString('en-US')} Robux.`);
                return;
            }

            document.getElementById("bigAvatarWrapperStep3").innerHTML = `<img src="${currentAvatarUrl}" alt="Avatar Final" class="avatar-container-img">`;
            document.getElementById("displayUsernameStep3").innerText = targetUser;
            document.getElementById("finalAmountText").innerText = currentEnteredAmount.toLocaleString('en-US');

            document.getElementById("step2").classList.remove("active");
            document.getElementById("step3").classList.add("active");
        }

        function backToStep2() {
            document.getElementById("step3").classList.remove("active");
            document.getElementById("step2").classList.add("active");
            validateNextButton(document.getElementById("customAmountInput").value);
            resizeAmountInput(document.getElementById("customAmountInput"));
        }

        function confirmAndSend() {
            if (currentEnteredAmount > myRobuxBalance) {
                alert("Insufficient funds!");
                backToStep2();
                return;
            }

            myRobuxBalance -= currentEnteredAmount;
            updateBalanceDisplay();

            const notif = document.getElementById("topCapsihleNotif");
            notif.innerHTML = `<img src="https://devforum-uploads.s3.dualstack.us-east-2.amazonaws.com/uploads/original/4X/c/2/f/c2fc0404eeb8d393407bdaebe2cc9994a8953550.png" alt="R" class="top-notif-icon"> Successfully sent ${currentEnteredAmount.toLocaleString('en-US')} Robux to ${targetUser}!`;
            notif.classList.add("show");

            setTimeout(() => { notif.classList.remove("show"); }, 5000);

            document.getElementById("usernameInput").value = "";
            document.getElementById("customAmountInput").value = "";
            document.getElementById("resultsBox").style.display = "none";
            document.getElementById("step3").classList.remove("active");
            document.getElementById("step1").classList.add("active");

            closeGui();
            
            targetUser = "";
            currentEnteredAmount = 0;
            currentAvatarUrl = "";
            currentUserJoinDate = "--.--.----";
            currentUserIsBanned = false;
        }
    </script>
</body>
</html>
